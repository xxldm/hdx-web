server:
  host: 0.0.0.0
  port: 3000

backend:
  gatewayBaseUrl: http://localhost:18080
  authBaseUrl: http://localhost:18082

auth:
  sessionSecret: please-change-this-to-a-long-random-secret
  cookieSecure: true
  sessionCookieName: hdx_web_session
  csrfCookieName: hdx_csrf
  csrfHeaderName: X-HDX-CSRF
  sessionMaxAgeSeconds: 604800
  refreshSkewSeconds: 60

# 仅 Full/local 或特殊本机集成场景使用，普通 Web Online 包不建议默认启用。
localBackend:
  tokenHeader:
  token:
